<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>爱情记忆宇宙</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="cinematicBg" aria-hidden="false">
    <div id="cinematicStars" class="cinematic-stars"></div>
    <div id="cinematicMeteors" class="cinematic-meteors"></div>
    <div id="cinematicContent" class="cinematic-content">
      <h1 id="cinematicTitle"></h1>
      <p id="cinematicSubtitle"></p>
      <div id="cinematicButtons" class="cinematic-buttons"></div>
    </div>
  </div>

  <canvas id="meteorCanvas" aria-hidden="true"></canvas>
  <div id="webgl"></div>
  <div id="fireworkPhotoLayer" aria-hidden="true"></div>
  <div id="introHeart" aria-hidden="true">❤</div>
  <div id="vignette"></div>
  <div id="flash"></div>
  <canvas id="textParticles" aria-hidden="true"></canvas>

  <div class="overlay" id="overlay">
    <div class="stars-container" id="starsContainer" aria-hidden="true"></div>

    <div class="book-container" id="bookContainer">
      <div class="book" id="book" aria-label="记忆之书"></div>
    </div>

    <div class="final-message hidden" id="finalMessage">我想和你一起走很久很久</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
